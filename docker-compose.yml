services:

  postgres:
    image: postgres:16-alpine
    container_name: farmacia_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-farmacia_monitor}
      POSTGRES_USER: ${POSTGRES_USER:-farmacia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-farmacia123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-farmacia} -d ${POSTGRES_DB:-farmacia_monitor}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: farmacia_api
    restart: unless-stopped
    command: uvicorn farmacia_monitor.api.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-farmacia}:${POSTGRES_PASSWORD:-farmacia123}@postgres:5432/${POSTGRES_DB:-farmacia_monitor}
      HEADLESS: "true"
      PARALELO_MAX: "1"
    volumes:
      - .:/app
      - ./config:/app/config
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  scraper:
    build: .
    container_name: farmacia_scraper
    restart: "no"
    command: python main.py
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-farmacia}:${POSTGRES_PASSWORD:-farmacia123}@postgres:5432/${POSTGRES_DB:-farmacia_monitor}
      HEADLESS: "true"
      PARALELO_MAX: "1"
      DEBUG_SCREENSHOTS: "${DEBUG_SCREENSHOTS:-false}"
    volumes:
      - .:/app
      - ./config:/app/config
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - scraper
    # Cron na VPS chama: docker compose run --rm scraper
    # O container sobe, coleta tudo e some automaticamente

volumes:
  postgres_data:
